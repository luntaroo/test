name: TruffleHog Secret Scanning

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Secret Scanning with TruffleHog
        uses: trufflesecurity/trufflehog@v3.93.6
        with:
          extra_args: --results=verified,unknown
